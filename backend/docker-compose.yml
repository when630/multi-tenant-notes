version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: multitenant-notes-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: multitenant_notes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
