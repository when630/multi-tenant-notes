spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/multitenant_notes
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: your-256-bit-secret-key-here-must-be-long-enough
  access-token-expiry: 3600
  refresh-token-expiry: 604800
